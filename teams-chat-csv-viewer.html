<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teams Chat Viewer</title>
    <style>
/* Teams Chat Viewer - CSS Variables for Light/Dark Theme */

/* Screen-reader only element for aria-live announcements */
.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

:root {
    /* Light Theme (default) */
    --bg-app: #f5f5f5;
    --bg-surface: #ffffff;
    --bg-surface-alt: #f3f2f1;
    --border-color: #e1dfdd;
    --text-primary: #252424;
    --text-secondary: #616161;
    --accent: #6264a7;
    --accent-bg: rgba(98, 100, 167, 0.1);
    --own-bubble: #e5e5f1;
    --own-bubble-text: #252424;
    --other-bubble: #ffffff;
    --other-bubble-text: #252424;
    --shadow: rgba(0, 0, 0, 0.08);
    --shadow-soft: rgba(0, 0, 0, 0.04);
}

[data-theme="light"] {
    /* Light Theme override — ensures explicit light setting works */
    --bg-app: #f5f5f5;
    --bg-surface: #ffffff;
    --bg-surface-alt: #f3f2f1;
    --border-color: #e1dfdd;
    --text-primary: #252424;
    --text-secondary: #616161;
    --accent: #6264a7;
    --accent-bg: rgba(98, 100, 167, 0.1);
    --own-bubble: #e5e5f1;
    --own-bubble-text: #252424;
    --other-bubble: #ffffff;
    --other-bubble-text: #252424;
    --shadow: rgba(0, 0, 0, 0.08);
    --shadow-soft: rgba(0, 0, 0, 0.04);
}

[data-theme="dark"] {
    /* Dark Theme (Teams dark mode inspired) */
    --bg-app: #1f1f1f;
    --bg-surface: #292929;
    --bg-surface-alt: #2d2d2d;
    --border-color: #3f3f3f;
    --text-primary: #ffffff;
    --text-secondary: #adadb8;
    --accent: #a6a7dc;
    --accent-bg: rgba(166, 167, 220, 0.15);
    --own-bubble: #2d2c5e;
    --own-bubble-text: #ffffff;
    --other-bubble: #323232;
    --other-bubble-text: #ffffff;
    --shadow: rgba(0, 0, 0, 0.2);
    --shadow-soft: rgba(0, 0, 0, 0.15);
}

[data-theme="high-contrast"] {
    /* High Contrast Theme (Teams HC Black) */
    --bg-app: #000000;
    --bg-surface: #000000;
    --bg-surface-alt: #000000;
    --border-color: #ffffff;
    --text-primary: #ffffff;
    --text-secondary: #ffffff;
    --accent: #ffff00;
    --accent-bg: rgba(255, 255, 0, 0.2);
    --own-bubble: #000000;
    --own-bubble-text: #ffffff;
    --other-bubble: #000000;
    --other-bubble-text: #ffffff;
    --shadow: rgba(255, 255, 255, 0.0);
    --shadow-soft: rgba(255, 255, 255, 0.0);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background-color: var(--bg-app);
    color: var(--text-primary);
    line-height: 1.5;
}

.app-container {
    max-width: 900px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-color: var(--bg-app);
}

/* Controls */
.controls {
    background-color: var(--bg-surface-alt);
    border-top: 1px solid var(--border-color);
    padding: 10px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: center;
    position: sticky;
    bottom: 0;
    z-index: 100;
    box-shadow: 0 -1px 3px var(--shadow-soft);
    font-size: 13px;
}

.control-group {
    display: flex;
    align-items: center;
    gap: 6px;
}

.control-group label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    white-space: nowrap;
}

input[type="file"] {
    font-size: 13px;
    color: var(--text-primary);
    cursor: pointer;
}

select {
    font-size: 13px;
    padding: 4px 10px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background-color: var(--bg-surface);
    color: var(--text-primary);
    cursor: pointer;
    min-width: 140px;
}

select:focus {
    border-color: var(--accent);
}

select:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
}

input[type="file"]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 4px;
}

.btn-theme:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
}

/* Theme Toggle Button */
.btn-theme {
    background: none;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background-color 0.2s;
    line-height: 1.4;
}

.btn-theme:hover {
    background-color: var(--bg-surface);
    color: var(--text-primary);
}

[data-theme="high-contrast"] .btn-theme:hover {
    background-color: var(--text-primary);
    color: var(--bg-app);
    outline: 2px solid var(--text-primary);
}
.chat-header {
    background-color: var(--bg-surface-alt);
    padding: 20px 24px;
    border-bottom: 1px solid var(--border-color);
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 101;
}

.chat-header h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    margin: 0;
}

/* Loading Indicator */
.loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px;
    position: sticky;
    top: 0;
    z-index: 102;
    background-color: var(--bg-surface);
    border-bottom: 1px solid var(--border-color);
    font-size: 13px;
    color: var(--text-secondary);
}

.loading-spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border-color);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Chat Container */
.chat-container {
    flex: 1;
    padding: 24px;
    padding-bottom: 100px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* Drag-and-drop visual feedback */
.chat-container.drag-over {
    background-color: var(--accent-bg);
    outline: 2px dashed var(--accent);
    outline-offset: -12px;
    border-radius: 4px;
}

.empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 300px;
    color: var(--text-secondary);
    font-size: 16px;
}

/* Message Bubble */
.message {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    animation: fadeIn 0.2s ease-out;
    /* Browser-native virtual rendering: skip paint/layout for off-screen items */
    content-visibility: auto;
    contain-intrinsic-size: auto 60px;
}

/* Suppress animation after initial load to reduce composite layer overhead */
.loaded .message {
    animation: none;
}

/* Reduce gap for consecutive messages from the same sender */
.message[data-consecutive="true"] {
    margin-top: 4px;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(4px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.message.own {
    align-self: flex-end;
    align-items: flex-end;
}

.message.other {
    align-self: flex-start;
    align-items: flex-start;
}

.message-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
    padding: 0 4px;
}

.message-sender {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
}

.message.own .message-sender {
    color: var(--text-secondary);
}

.message-content {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
}

.message.own .message-content {
    background-color: var(--own-bubble);
    color: var(--own-bubble-text);
    border-bottom-right-radius: 2px;
}

.message.other .message-content {
    background-color: var(--other-bubble);
    color: var(--other-bubble-text);
    border-bottom-left-radius: 2px;
    box-shadow: 0 1px 2px var(--shadow);
}

[data-theme="high-contrast"] .message-content {
    border: 1px solid var(--border-color);
}

.message-time {
    font-size: 11px;
    color: var(--text-secondary);
}

.message-attachments {
    font-size: 11px;
    color: var(--accent);
    background-color: inherit;
    padding: 2px 8px;
    border-radius: 10px;
    text-decoration: none;
    display: block;
    text-align: left;
    margin-top: 4px;
}

.message-attachments:hover {
    text-decoration: underline;
}

/* Links inside message content */
.content-link {
    color: var(--accent);
    text-decoration: underline;
    word-break: break-all;
}

/* Respect user's motion preferences */
@media (prefers-reduced-motion: reduce) {
    .message {
        animation: none;
    }

    .loading-spinner {
        animation: none;
    }
}

/* Responsive */
@media (max-width: 600px) {
    .controls {
        flex-direction: column;
        align-items: stretch;
    }

    .control-group {
        flex-direction: column;
        align-items: flex-start;
    }

    select {
        width: 100%;
    }

    .chat-container {
        padding: 16px;
        padding-bottom: 100px;
    }

    .message {
        max-width: 90%;
    }
}
</style>
</head>
<body>
    <div class="app-container">
        <div class="chat-header" id="chatHeader" style="display: none;">
            <h1 id="chatTitle"></h1>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="empty-state">
                <p>CSVファイルを選択またはドラッグ＆ドロップしてください</p>
            </div>
        </div>

        <div id="ariaStatus" class="sr-only" aria-live="polite" aria-atomic="true"></div>

        <div class="loading" id="loadingIndicator" style="display: none;">
            <div class="loading-spinner"></div>
            <span>読み込み中...</span>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="csvFile">CSVファイル:</label>
                <input type="file" id="csvFile" accept=".csv" aria-label="チャットログのCSVファイル">
            </div>
            <div class="control-group" id="selfSelectorGroup" style="display: none;">
                <label for="selfSelect">自分:</label>
                <select id="selfSelect" aria-label="自分として表示する送信者">
                    <option value="">-- 選択 --</option>
                </select>
            </div>
            <button class="btn-theme" id="themeToggle" title="テーマ切り替え" aria-label="ライト、ダーク、ハイコントラストのテーマを切り替え">☀️</button>
        </div>
    </div>

    <script>
(function () {
    'use strict';

    // DOM Elements
    const csvFileInput = document.getElementById('csvFile');
    const selfSelect = document.getElementById('selfSelect');
    const selfSelectorGroup = document.getElementById('selfSelectorGroup');
    const chatHeader = document.getElementById('chatHeader');
    const chatTitle = document.getElementById('chatTitle');
    const chatContainer = document.getElementById('chatContainer');
    const themeToggle = document.getElementById('themeToggle');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const ariaStatus = document.getElementById('ariaStatus');

    // State
    let parsedMessages = [];
    let currentSelf = '';
    let currentFileName = '';
    let currentTheme = 'light';

    // Theme definitions
    const THEMES = ['light', 'dark', 'high-contrast'];
    const THEME_ICONS = {
        light: '☀️',
        dark: '🌙',
        'high-contrast': '🔳'
    };

    /**
     * Parse CSV text (RFC 4180 compliant)
     * Handles quoted fields with embedded commas and newlines.
     */
    function parseCSV(text) {
        const lines = [];
        let currentLine = [];
        const fieldChars = [];
        let inQuotes = false;
        let i = 0;

        function flushField() {
            currentLine.push(fieldChars.join(''));
            fieldChars.length = 0;
        }

        while (i < text.length) {
            const char = text[i];
            const nextChar = text[i + 1];

            if (inQuotes) {
                if (char === '"') {
                    if (nextChar === '"') {
                        fieldChars.push('"');
                        i += 2;
                        continue;
                    } else {
                        inQuotes = false;
                    }
                } else {
                    fieldChars.push(char);
                }
            } else {
                if (char === '"') {
                    inQuotes = true;
                } else if (char === ',') {
                    flushField();
                } else if (char === '\r' && nextChar === '\n') {
                    flushField();
                    lines.push(currentLine);
                    currentLine = [];
                    i++; // skip \n
                } else if (char === '\n' || char === '\r') {
                    flushField();
                    lines.push(currentLine);
                    currentLine = [];
                } else {
                    fieldChars.push(char);
                }
            }
            i++;
        }

        // Flush remaining field
        flushField();
        if (currentLine.length > 1 || (currentLine.length === 1 && currentLine[0] !== '')) {
            lines.push(currentLine);
        }

        if (lines.length === 0) return [];

        const headers = lines[0];
        const result = [];

        for (let j = 1; j < lines.length; j++) {
            const row = lines[j];
            const obj = {};
            for (let k = 0; k < headers.length; k++) {
                const key = headers[k].trim().replace(/^"|"$/g, '');
                const value = row[k] !== undefined ? row[k] : '';
                obj[key] = value;
            }
            result.push(obj);
        }

        return result;
    }

    /**
     * Extract unique sender names from messages.
     */
    function extractSenders(messages) {
        const senders = new Set();
        for (const msg of messages) {
            if (msg.From) {
                senders.add(msg.From);
            }
        }
        return Array.from(senders);
    }

    /**
     * Update the "self" selector dropdown with sender names.
     */
    function updateSelfSelector(senders) {
        selfSelect.innerHTML = '<option value="">-- 選択 --</option>';
        for (const sender of senders) {
            const option = document.createElement('option');
            option.value = sender;
            option.textContent = sender;
            selfSelect.appendChild(option);
        }
    }

    /**
     * Populate a container with text nodes and clickable links.
     * URLs are parsed; link text is the decoded filename portion.
     */
    function appendContentWithLinks(container, text) {
        // Match URLs, but stop at closing brackets commonly used as delimiters
        const urlRegex = /(https?:\/\/[^\s)\]}>]+)/g;
        let lastIndex = 0;
        let match;
        let found = false;

        while ((match = urlRegex.exec(text)) !== null) {
            found = true;
            const fullMatch = match[0];
            let url = fullMatch;

            // Strip trailing punctuation
            while (url.length > 0 && '.,;:!?'.includes(url[url.length - 1])) {
                url = url.slice(0, -1);
            }

            // Check for unbalanced parentheses and restore ')' if needed
            let parenCount = 0;
            for (let i = 0; i < url.length; i++) {
                if (url[i] === '(') parenCount++;
                else if (url[i] === ')') parenCount--;
            }

            let restoredChars = '';
            if (parenCount > 0) {
                let pos = match.index + fullMatch.length;
                while (parenCount > 0 && pos < text.length && text[pos] === ')') {
                    restoredChars += ')';
                    url += ')';
                    parenCount--;
                    pos++;
                }
            }

            if (match.index > lastIndex) {
                container.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
            }

            let rawFileName = url.substring(url.lastIndexOf('/') + 1);
            if (!rawFileName) {
                const trimmed = url.replace(/\/+$/, '');
                rawFileName = trimmed.substring(trimmed.lastIndexOf('/') + 1) || trimmed;
            }
            let decodedFileName;
            try {
                decodedFileName = decodeURIComponent(rawFileName);
            } catch (_e) {
                decodedFileName = rawFileName;
            }
            const a = document.createElement('a');
            a.href = url;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            a.className = 'content-link';
            a.textContent = decodedFileName;
            container.appendChild(a);

            lastIndex = match.index + fullMatch.length + restoredChars.length;
        }

        if (!found) {
            container.textContent = text;
        } else if (lastIndex < text.length) {
            container.appendChild(document.createTextNode(text.slice(lastIndex)));
        }
    }

    /**
     * Render a single message element.
     * @param {Object} message
     * @param {Object|null} prevMessage - previous message for consecutive detection
     */
    function createMessageElement(message, prevMessage) {
        const from = message.From || 'Unknown';
        const content = message.Content || '';
        const dateTime = message.DateTime || '';
        const attachments = message.Attachments || '';
        const isOwn = from === currentSelf;
        const isConsecutive = prevMessage && prevMessage.From === from;

        const msgDiv = document.createElement('div');
        msgDiv.className = 'message ' + (isOwn ? 'own' : 'other');
        if (isConsecutive) {
            msgDiv.setAttribute('data-consecutive', 'true');
        }

        const headerDiv = document.createElement('div');
        headerDiv.className = 'message-header';

        const senderDiv = document.createElement('div');
        senderDiv.className = 'message-sender';
        senderDiv.textContent = from;

        const timeSpan = document.createElement('span');
        timeSpan.className = 'message-time';
        timeSpan.textContent = dateTime;

        headerDiv.appendChild(senderDiv);
        headerDiv.appendChild(timeSpan);

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        appendContentWithLinks(contentDiv, content);

        if (attachments.trim()) {
            const rawUrl = attachments.trim();
            const rawFileName = rawUrl.substring(rawUrl.lastIndexOf('/') + 1);
            let decodedFileName;
            try {
                decodedFileName = decodeURIComponent(rawFileName);
            } catch (_e) {
                decodedFileName = rawFileName;
            }

            const attachLink = document.createElement('a');
            attachLink.className = 'message-attachments';
            attachLink.href = rawUrl;
            attachLink.target = '_blank';
            attachLink.rel = 'noopener noreferrer';
            attachLink.title = rawUrl;
            attachLink.textContent = '📎 ' + decodedFileName;

            if (content.trim()) {
                contentDiv.appendChild(document.createElement('br'));
            }
            contentDiv.appendChild(attachLink);
        }

        msgDiv.appendChild(headerDiv);
        msgDiv.appendChild(contentDiv);

        return msgDiv;
    }

    /**
     * Render all messages into the chat container.
     * Optimizations for large datasets:
     *   - Diff-update when only self-selection changed (same message count)
     *   - DocumentFragment batching for fewer reflows
     *   - Chunked rendering via requestAnimationFrame for >500 messages
     * @param {boolean} forceFullRender - skip diff update and always do full render
     */
    function renderMessages(forceFullRender) {
        const existing = chatContainer.querySelectorAll('.message');

        // Fast path: if message count hasn't changed, only toggle own/other classes
        if (!forceFullRender && existing.length > 0 && existing.length === parsedMessages.length) {
            let changed = false;
            existing.forEach((el, i) => {
                const shouldOwn = parsedMessages[i].From === currentSelf;
                const isOwn = el.classList.contains('own');
                if (shouldOwn !== isOwn) {
                    el.classList.toggle('own', shouldOwn);
                    el.classList.toggle('other', !shouldOwn);
                    changed = true;
                }
            });
            if (changed) return;
        }

        // Full render
        chatContainer.innerHTML = '';

        if (parsedMessages.length === 0) {
            chatContainer.innerHTML = '<div class="empty-state"><p>CSVファイルを選択またはドラッグ＆ドロップしてください</p></div>';
            return;
        }

        // Mark body as loaded to suppress entry animations on subsequent renders
        document.body.classList.add('loaded');

        // Small file: render all at once with DocumentFragment for fewer reflows
        if (parsedMessages.length <= 500) {
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < parsedMessages.length; i++) {
                const prev = i > 0 ? parsedMessages[i - 1] : null;
                fragment.appendChild(createMessageElement(parsedMessages[i], prev));
            }
            chatContainer.appendChild(fragment);
            finishRender();
            return;
        }

        // Large file: chunked rendering to keep UI responsive
        const CHUNK_SIZE = 200;
        let index = 0;

        function renderChunk() {
            const fragment = document.createDocumentFragment();
            const end = Math.min(index + CHUNK_SIZE, parsedMessages.length);
            for (; index < end; index++) {
                const prev = index > 0 ? parsedMessages[index - 1] : null;
                fragment.appendChild(createMessageElement(parsedMessages[index], prev));
            }
            chatContainer.appendChild(fragment);

            if (index < parsedMessages.length) {
                requestAnimationFrame(renderChunk);
            } else {
                finishRender();
            }
        }

        renderChunk();
    }

    /**
     * Finish rendering: hide loading, announce status, and move focus for accessibility.
     */
    function finishRender() {
        if (loadingIndicator) {
            loadingIndicator.style.display = 'none';
        }
        if (ariaStatus) {
            ariaStatus.textContent = 'チャットログを ' + parsedMessages.length + ' 件読み込みました。';
        }
        chatContainer.setAttribute('tabindex', '-1');
        chatContainer.focus({ preventScroll: true });
    }

    /**
     * Read a File object as text.
     */
    function readFileAsText(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.onerror = (e) => reject(e);
            reader.readAsText(file);
        });
    }

    /**
     * Process a CSV File object (used by both file input and drag-and-drop).
     */
    async function processFile(file) {
        if (!file) return;

        currentFileName = file.name.replace(/\.csv$/i, '');

        // Show loading indicator
        if (loadingIndicator) {
            loadingIndicator.style.display = 'flex';
        }

        try {
            let text = await readFileAsText(file);
            // Strip UTF-8 BOM if present
            if (text.charCodeAt(0) === 0xFEFF) {
                text = text.slice(1);
            }
            parsedMessages = parseCSV(text);
            // Sort by DateTime so oldest messages appear at the top (past → future, top → bottom)
            parsedMessages.sort(function (a, b) {
                return new Date(a.DateTime) - new Date(b.DateTime);
            });

            // Update header
            chatTitle.textContent = currentFileName;
            chatHeader.style.display = 'block';

            // Update self selector
            const senders = extractSenders(parsedMessages);
            updateSelfSelector(senders);
            selfSelectorGroup.style.display = senders.length > 0 ? 'flex' : 'none';

            // Reset self selection
            currentSelf = '';
            selfSelect.value = '';

            // Render (loading will be hidden inside finishRender)
            renderMessages(true);
        } catch (err) {
            if (loadingIndicator) {
                loadingIndicator.style.display = 'none';
            }
            alert('CSVファイルの読み込みに失敗しました: ' + err.message);
            console.error(err);
        }
    }

    /**
     * Handle CSV file selection.
     */
    function handleFileSelect(event) {
        const file = event.target.files[0];
        processFile(file);
    }

    /**
     * Handle drag-and-drop events on the chat container.
     */
    function handleDragOver(event) {
        event.preventDefault();
        chatContainer.classList.add('drag-over');
    }

    function handleDragLeave(event) {
        chatContainer.classList.remove('drag-over');
    }

    function handleDrop(event) {
        event.preventDefault();
        chatContainer.classList.remove('drag-over');

        const file = event.dataTransfer.files[0];
        if (file && file.name.toLowerCase().endsWith('.csv')) {
            processFile(file);
            if (ariaStatus) {
                ariaStatus.textContent = 'CSVファイル ' + file.name + ' をドロップしました。';
            }
        } else {
            if (ariaStatus) {
                ariaStatus.textContent = 'CSVファイル以外はドロップできません。';
            }
        }
    }

    /**
     * Handle self-selection change.
     */
    function handleSelfChange(event) {
        currentSelf = event.target.value;
        renderMessages();
    }

    /**
     * Theme toggle logic.
     */
    function applyTheme(theme) {
        if (!THEMES.includes(theme)) {
            console.warn('Invalid theme:', theme);
            theme = 'light';
        }
        currentTheme = theme;
        document.documentElement.setAttribute('data-theme', currentTheme);
        if (themeToggle) {
            themeToggle.textContent = THEME_ICONS[currentTheme];
        }
        try {
            localStorage.setItem('teamsChatTheme', currentTheme);
        } catch (_e) {
            // ignore (e.g. private mode where localStorage is disabled)
        }
    }

    function initTheme() {
        let saved;
        try {
            saved = localStorage.getItem('teamsChatTheme');
        } catch (_e) {
            saved = null;
        }
        if (THEMES.includes(saved)) {
            applyTheme(saved);
        } else if (window.matchMedia && window.matchMedia('(forced-colors: active)').matches) {
            applyTheme('high-contrast');
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            applyTheme('dark');
        } else {
            applyTheme('light');
        }
    }

    function handleThemeToggle() {
        const nextIndex = (THEMES.indexOf(currentTheme) + 1) % THEMES.length;
        applyTheme(THEMES[nextIndex]);
    }

    // Event listeners
    csvFileInput.addEventListener('change', handleFileSelect);
    selfSelect.addEventListener('change', handleSelfChange);
    themeToggle.addEventListener('click', handleThemeToggle);

    chatContainer.addEventListener('dragover', handleDragOver);
    chatContainer.addEventListener('dragleave', handleDragLeave);
    chatContainer.addEventListener('drop', handleDrop);

    initTheme();
})();
</script>
</body>
</html>
